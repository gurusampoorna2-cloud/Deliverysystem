<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU Delivery System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #ea580c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Save Animation Styles */
        .btn-saved {
            transform: scale(0.9) !important;
            background-color: #10b981 !important; /* emerald-500 */
            transition: all 0.3s ease;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -30px); opacity: 0; }
        }
        .saved-toast {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            color: #10b981;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: floatUp 1s forwards;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Loading State Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center space-y-4">
        <div class="loading-spinner"></div>
        <p class="text-xs font-black uppercase tracking-widest text-slate-400">Syncing with GURU Cloud...</p>
        <button id="skipLoading" onclick="window.dismissLoading()" class="hidden px-6 py-2 bg-slate-900 text-white rounded-full text-[10px] font-black uppercase tracking-widest transition-all hover:bg-orange-600">Proceed to Dashboard</button>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-slate-900/60 hidden transition-opacity duration-300" onclick="window.toggleSidebar()"></div>

    <!-- Sidebar Drawer -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white shadow-2xl sidebar-transition -translate-x-full">
        <div class="h-full flex flex-col p-6">
            <div class="flex items-center justify-between mb-10 px-2">
                <div class="flex items-center space-x-3 text-orange-600">
                    <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="truck"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-tighter text-slate-900 uppercase italic">GURU</h1>
                </div>
                <button onclick="window.toggleSidebar()" class="text-slate-400 hover:text-slate-900">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav id="navLinks" class="flex-1 space-y-2 overflow-y-auto custom-scrollbar pr-1"></nav>
        </div>
    </aside>

    <main class="min-h-screen flex flex-col">
        <nav class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 sticky top-0 z-30">
            <div class="absolute left-4">
                <button onclick="window.toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-600 flex items-center gap-2">
                    <i data-lucide="menu"></i>
                    <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu</span>
                </button>
            </div>
            <div class="flex-1 text-center">
                <h1 class="text-base md:text-lg font-black text-slate-900 tracking-[0.2em] uppercase italic inline-block px-6 text-orange-600">GURU Delivery System</h1>
            </div>
        </nav>

        <div id="app" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
            <div id="sectionHeader" class="mb-8 animate-in fade-in slide-in-from-top-2">
                <h2 id="viewTitle" class="text-2xl font-black text-slate-900 uppercase tracking-tight">View Title</h2>
                <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">Cloud Control Dashboard</p>
            </div>
            <div id="viewContent" class="pb-20"></div>
        </div>
    </main>

    <!-- Global Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden modal-bg" onclick="if(event.target === this) window.closeModal()">
        <div id="modalBody" class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Firebase SDK Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", 
            authDomain: "gurudeliverysystem.firebaseapp.com",
            projectId: "gurudeliverysystem",
            storageBucket: "gurudeliverysystem.firebasestorage.app",
            messagingSenderId: "197900697167",
            appId: "1:197900697167:web:210d24d7e61f70360bb43a"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'guru-delivery-system-v1';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Central State ---
        let state = {
            user: null,
            currentView: 'customers',
            customers: [],
            deliveries: [],
            drivers: [],
            customerVisibleCount: 10,
            editingCustomer: null,
            editingDriverIndex: null,
            activeTodayDriver: null,
            performanceFilter: { driver: 'All', fromDate: '', toDate: '' },
            topCustomerFilter: { fromDate: '', toDate: '', customerId: '' },
            listenersStarted: false,
            initialLoadStatus: {
                customers: false,
                deliveries: false,
                drivers: false
            }
        };

        const menuItems = [
            { id: 'customers', label: 'Customer Data', icon: 'users' },
            { id: 'assign', label: 'Assign', icon: 'truck' },
            { id: 'past', label: 'Past Orders', icon: 'history' },
            { id: 'top_customers', label: 'Top Customers', icon: 'award' },
            { id: 'settings', label: 'Settings', icon: 'settings' },
            { id: 'today', label: 'Today Delivery', icon: 'calendar', special: true },
            { id: 'my_performance', label: 'My Performance', icon: 'user-check', special: true }
        ];

        // --- Core Helper Functions ---
        window.getElapsedTime = (startTime) => {
            if (!startTime) return "00:00:00";
            const diff = Date.now() - startTime;
            if (diff < 0) return "00:00:00";
            const sec = Math.floor((diff / 1000) % 60);
            const min = Math.floor((diff / (1000 * 60)) % 60);
            const hrs = Math.floor((diff / (1000 * 60 * 60)));
            return [hrs, min, sec].map(v => v.toString().padStart(2, '0')).join(':');
        };

        window.formatDuration = (ms) => {
            if (!ms || ms < 0) return "N/A";
            const minutes = Math.floor(ms / 60000);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            return `${hours}h ${minutes % 60}m`;
        };

        window.formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) : "-";

        window.toggleSidebar = () => {
            const sb = document.getElementById('sidebar');
            const over = document.getElementById('sidebarOverlay');
            if (!sb || !over) return;
            const isOpen = !sb.classList.contains('-translate-x-full');
            sb.classList.toggle('-translate-x-full', isOpen);
            over.classList.toggle('hidden', isOpen);
        };

        window.navigateTo = (id) => {
            state.currentView = id;
            const item = menuItems.find(m => m.id === id);
            if (item) {
                const titleEl = document.getElementById('viewTitle');
                if (titleEl) titleEl.innerText = item.label;
            }
            renderSidebar();
            renderView();
            const sb = document.getElementById('sidebar');
            if (sb && !sb.classList.contains('-translate-x-full')) window.toggleSidebar();
            window.scrollTo(0, 0);
        };

        window.openModal = (html) => {
            const body = document.getElementById('modalBody');
            const container = document.getElementById('modalContainer');
            if (body && container) {
                body.innerHTML = html;
                container.classList.remove('hidden');
                lucide.createIcons();
            }
        };

        window.closeModal = () => {
            const container = document.getElementById('modalContainer');
            if (container) container.classList.add('hidden');
        };

        window.dismissLoading = () => {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('hidden');
            renderSidebar();
            renderView();
        };

        window.triggerSaveFeedback = (btnId) => {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            const originalText = btn.innerHTML;
            const parent = btn.parentElement;
            const pos = parent.style.position;
            parent.style.position = 'relative';

            btn.classList.add('btn-saved');
            btn.innerHTML = '<span class="flex items-center justify-center gap-1"><i data-lucide="check" class="w-3 h-3"></i> Saved</span>';
            lucide.createIcons();

            const toast = document.createElement('div');
            toast.className = 'saved-toast';
            toast.innerText = 'Cloud Synced!';
            parent.appendChild(toast);

            setTimeout(() => {
                btn.classList.remove('btn-saved');
                btn.innerHTML = originalText;
                toast.remove();
                parent.style.position = pos;
                lucide.createIcons();
            }, 1200);
        };

        // Live Timer Loop
        setInterval(() => {
            const timers = document.querySelectorAll('[data-timer-start]');
            timers.forEach(el => {
                const start = parseInt(el.getAttribute('data-timer-start'));
                el.innerText = window.getElapsedTime(start);
            });
        }, 1000);

        // --- Backend Auth & Listeners ---
        async function initBackend() {
            // UI Helpers for slow mobile connection
            setTimeout(() => {
                const skip = document.getElementById('skipLoading');
                if (skip) skip.classList.remove('hidden');
            }, 2000);

            // Fail-safe auto-dismissal for mobile
            setTimeout(() => {
                if (document.getElementById('loadingOverlay')) window.dismissLoading();
            }, 5000);

            try {
                // Step 1: Sign in FIRST as per Rule 3
                let user;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    const result = await signInWithCustomToken(auth, __initial_auth_token);
                    user = result.user;
                } else {
                    const result = await signInAnonymously(auth);
                    user = result.user;
                }
                
                if (user) {
                    state.user = user;
                    // Step 2: Start listeners immediately after auth
                    if (!state.listenersStarted) {
                        state.listenersStarted = true;
                        startListeners();
                    }
                }

                // Monitor auth changes for state persistence
                onAuthStateChanged(auth, (u) => { state.user = u; });

            } catch (error) {
                console.error("Auth Error:", error);
                // On error, let user try to enter anyway
                setTimeout(window.dismissLoading, 1000);
            }
        }

        function startListeners() {
            if (!state.user) return;
            const publicPath = (coll) => collection(db, 'artifacts', appId, 'public', 'data', coll);

            const handleLoaded = (key) => {
                state.initialLoadStatus[key] = true;
                checkInitialLoading();
            };

            onSnapshot(publicPath('customers'), (snapshot) => {
                state.customers = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                if (state.currentView === 'customers') renderCustomerList();
                handleLoaded('customers');
            }, (err) => { handleLoaded('customers'); });

            onSnapshot(publicPath('deliveries'), (snapshot) => {
                state.deliveries = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                if (['assign', 'today', 'past'].includes(state.currentView)) renderView();
                handleLoaded('deliveries');
            }, (err) => { handleLoaded('deliveries'); });

            onSnapshot(publicPath('drivers'), (snapshot) => {
                state.drivers = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                if (!state.activeTodayDriver && state.drivers.length > 0) state.activeTodayDriver = state.drivers[0].name;
                if (state.currentView === 'settings') renderDriverList();
                handleLoaded('drivers');
            }, (err) => { handleLoaded('drivers'); });
        }

        function checkInitialLoading() {
            const { customers, deliveries, drivers } = state.initialLoadStatus;
            if (customers && deliveries && drivers) {
                window.dismissLoading();
            }
        }

        // --- Communication Helpers ---
        window.formatPhone = (num) => {
            if (!num) return '';
            let clean = num.toString().replace(/\D/g, '');
            if (clean.length === 10) return `+91${clean}`;
            if (clean.length === 12 && clean.startsWith('91')) return `+${clean}`;
            return clean.startsWith('+') ? clean : `+91${clean}`;
        };

        // --- View & List Rendering ---
        function renderSidebar() {
            const nav = document.getElementById('navLinks');
            if(!nav) return;
            nav.innerHTML = menuItems.map(item => {
                const isActive = state.currentView === item.id;
                const activeCls = isActive ? (item.special ? 'bg-slate-900 text-white shadow-xl ring-2 ring-orange-500/20' : 'bg-orange-600 text-white shadow-lg shadow-orange-100')
                                          : (item.special ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900');
                return `<button onclick="window.navigateTo('${item.id}')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${activeCls}"><i data-lucide="${item.icon}" class="w-5 h-5"></i><span class="font-bold text-sm">${item.label}</span></button>`;
            }).join('');
            lucide.createIcons();
        }

        function renderView() {
            const container = document.getElementById('viewContent');
            if(!container) return;
            container.innerHTML = '';
            switch (state.currentView) {
                case 'customers': renderCustomerSection(container); break;
                case 'assign': renderAssignSection(container); break;
                case 'past': renderPastSection(container); break;
                case 'top_customers': renderTopCustomersSection(container); break;
                case 'settings': renderSettingsSection(container); break;
                case 'today': renderTodaySection(container); break;
                case 'my_performance': renderMyPerformanceSection(container); break;
            }
            lucide.createIcons();
        }

        window.renderCustomerList = () => {
            const queryVal = document.getElementById('customerSearch')?.value.toLowerCase() || '';
            const filtered = state.customers.filter(c => c.name.toLowerCase().includes(queryVal) || c.id.toLowerCase().includes(queryVal) || (c.primaryPhone && c.primaryPhone.includes(queryVal)));
            const tbody = document.getElementById('customerTableBody');
            if(!tbody) return;
            tbody.innerHTML = filtered.slice(0, state.customerVisibleCount).map(c => `
                <tr onclick="window.showCustomerDetails('${c.firebaseId}')" class="hover:bg-slate-50/50 cursor-pointer">
                    <td class="px-6 py-4 font-bold text-slate-800">${c.name}<br><span class="text-[10px] text-slate-400 uppercase font-black">ID: ${c.id}</span></td>
                    <td class="px-6 py-4 text-xs text-slate-500">${c.primaryPhone}</td>
                    <td class="px-6 py-4 text-right" onclick="event.stopPropagation()">
                        <div class="flex justify-end gap-1"><button onclick="window.editCustomer('${c.firebaseId}')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="window.deleteCustomer('${c.firebaseId}')" class="p-2 text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
                    </td>
                </tr>
            `).join('');
            const showMore = document.getElementById('showMoreContainer');
            if (showMore) showMore.classList.toggle('hidden', filtered.length <= state.customerVisibleCount);
            lucide.createIcons();
        };

        window.renderDriverList = () => {
            const list = document.getElementById('driverList');
            if(!list) return;
            list.innerHTML = state.drivers.map((d, i) => `<div class="flex items-center justify-between p-4 group transition-colors hover:bg-slate-50"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-slate-100 text-slate-400 flex items-center justify-center rounded-lg font-black text-xs uppercase shadow-sm">${d.name.substring(0, 2)}</div><div><p class="font-bold text-sm text-slate-700">${d.name}</p><p class="text-[10px] text-slate-400 font-bold">${d.phone}</p></div></div><div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onclick="window.editDriver(${i})" class="p-2 text-slate-400 hover:text-blue-500 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="window.removeDriver('${d.firebaseId}')" class="p-2 text-slate-400 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('');
            lucide.createIcons();
        };

        // --- View Specific Content Generators ---
        function renderCustomerSection(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-2">
                    <div class="xl:col-span-1">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm sticky top-24">
                            <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2"><i data-lucide="${state.editingCustomer ? 'edit-2' : 'user-plus'}" class="${state.editingCustomer ? 'text-blue-600' : 'text-orange-600'}"></i>${state.editingCustomer ? 'Edit Customer' : 'Add Customer'}</h3>
                            <form id="customerForm" onsubmit="window.saveCustomer(event)" class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">ID</label><input type="text" id="c_id" required class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.id : ''}"></div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Name</label><input type="text" id="c_name" required class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.name : ''}"></div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Primary No.</label><div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 font-bold">+91</span><input type="text" id="c_p1" required class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm" placeholder="10 digits" value="${state.editingCustomer ? state.editingCustomer.primaryPhone.replace('+91', '') : ''}"></div></div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Alt No.</label><div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 font-bold">+91</span><input type="text" id="c_p2" class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm" placeholder="Optional" value="${state.editingCustomer ? (state.editingCustomer.alternatePhone || '').replace('+91', '') : ''}"></div></div>
                                </div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Address</label><textarea id="c_addr" required class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" rows="2">${state.editingCustomer ? state.editingCustomer.address : ''}</textarea></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Maps URL</label><input type="text" id="c_link" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.addressLink : ''}"></div>
                                <div class="flex gap-2">
                                    <button type="submit" id="customerSaveBtn" class="flex-1 ${state.editingCustomer ? 'bg-blue-600' : 'bg-orange-600'} text-white py-3 rounded-xl font-bold shadow-lg uppercase text-xs tracking-widest">${state.editingCustomer ? 'Update' : 'Save Entry'}</button>
                                    ${state.editingCustomer ? `<button type="button" onclick="window.cancelCustomerEdit()" class="px-4 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs uppercase">Cancel</button>` : ''}
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="xl:col-span-2 space-y-4">
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3"><i data-lucide="search" class="text-slate-400"></i><input type="text" id="customerSearch" oninput="window.renderCustomerList()" placeholder="Search Name, ID or Phone..." class="flex-1 bg-transparent border-none outline-none text-sm"></div>
                        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-100"><tr><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Customer</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Contact</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-right">Actions</th></tr></thead>
                                <tbody id="customerTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                            <div id="showMoreContainer" class="p-4 border-t border-slate-100 text-center hidden"><button onclick="state.customerVisibleCount += 10; window.renderCustomerList()" class="text-xs font-black text-orange-600 uppercase tracking-widest hover:underline">Show More</button></div>
                        </div>
                    </div>
                </div>
            `;
            window.renderCustomerList();
        }

        function renderPastSection(container) {
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-wrap gap-4 items-end">
                        <div class="flex-1 min-w-[140px]"><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">From</label><input type="date" id="p_from" onchange="window.renderPastOrdersList()" class="w-full text-xs border border-slate-200 rounded-lg p-2"></div>
                        <div class="flex-1 min-w-[140px]"><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">To</label><input type="date" id="p_to" onchange="window.renderPastOrdersList()" class="w-full text-xs border border-slate-200 rounded-lg p-2"></div>
                        <div class="flex-1 min-w-[140px]"><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Driver</label><select id="p_driver" onchange="window.renderPastOrdersList()" class="w-full text-xs border border-slate-200 rounded-lg p-2"><option value="All">All Drivers</option>${state.drivers.map(d => `<option value="${d.name}">${d.name}</option>`).join('')}</select></div>
                        <button onclick="window.resetPastFilters()" class="p-2.5 bg-slate-50 text-slate-400 rounded-lg hover:text-orange-600 transition-colors"><i data-lucide="x"></i></button>
                    </div>

            });
            const map = {};
            filtered.forEach(d => { if(!map[d.customerId]) map[d.customerId] = { name: d.customerName, count: 0, total: 0 }; map[d.customerId].count++; map[d.customerId].total += Number(d.amount); });

        window.updateMyPerformance = () => {
            const drv = document.getElementById('perf_driver')?.value || 'All';
            const f = document.getElementById('perf_from')?.value;
            const t = document.getElementById('perf_to')?.value;
            const filtered = state.deliveries.filter(d => (drv === 'All' || d.driver === drv) && ((f && t) ? (d.date >= f && d.date <= t) : true));
            const deliv = filtered.filter(d => d.status === 'Delivered');
            const totalMs = deliv.filter(d => d.deliveredAt && d.pickedUpAt).reduce((a,c) => a + (c.deliveredAt - c.pickedUpAt), 0);
            const validCount = deliv.filter(d => d.deliveredAt && d.pickedUpAt).length;
            const metrics = document.getElementById('perfMetrics');
            if(metrics) metrics.innerHTML = `<div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Delivered</p><h3 class="text-4xl font-black mt-2 text-slate-900">${deliv.length}</h3></div><div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-blue-600">Avg Trip Time</p><h3 class="text-4xl font-black mt-2 text-blue-600">${window.formatDuration(validCount > 0 ? totalMs / validCount : 0)}</h3></div>`;
            const log = document.getElementById('perfLogBody');
            if(log) log.innerHTML = deliv.length === 0 ? '<tr><td colspan="4" class="p-12 text-center text-slate-300 font-medium italic">No personal activity recorded for this selection.</td></tr>' : deliv.map(o => `<tr class="hover:bg-slate-50 transition-colors"><td class="px-6 py-4 font-black text-xs text-slate-700">${o.id}<br><span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${o.customerName}</span></td><td class="px-6 py-4 text-center text-xs font-bold text-slate-600">${window.formatTime(o.pickedUpAt)}</td><td class="px-6 py-4 text-center text-xs font-bold text-slate-600">${window.formatTime(o.deliveredAt)}</td><td class="px-6 py-4 text-right font-black text-blue-600 italic text-xs tracking-tighter">${window.formatDuration(o.deliveredAt - o.pickedUpAt)}</td></tr>`).join('');
            lucide.createIcons();

                name: document.getElementById('c_name').value,
                primaryPhone: window.formatPhone(document.getElementById('c_p1').value),
                alternatePhone: document.getElementById('c_p2').value ? window.formatPhone(document.getElementById('c_p2').value) : '',
                address: document.getElementById('c_addr').value,
                addressLink: document.getElementById('c_link').value,
                updatedAt: Date.now()
            };
            
            if (state.editingCustomer) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', state.editingCustomer.firebaseId), data);
                state.editingCustomer = null;
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), data);
            }
            
            window.triggerSaveFeedback('customerSaveBtn');
            setTimeout(() => renderView(), 1000);

        };

        window.saveDriver = async (data) => {
            if (!state.user) return;
            const coll = collection(db, 'artifacts', appId, 'public', 'data', 'drivers');
            data.phone = window.formatPhone(data.phone);

            if (state.editingDriverIndex !== null) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', state.drivers[state.editingDriverIndex].firebaseId), data);
                state.editingDriverIndex = null;
            } else {
                await addDoc(coll, data);
            }
            window.triggerSaveFeedback('driverBtn');
            setTimeout(() => window.resetDriverForm(), 1000);
        };

        window.removeDriver = async (fid) => { if(confirm('Delete partner?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', fid)); };

        // --- Main Initialization ---
        initBackend();
    </script>
</body>
</html>
