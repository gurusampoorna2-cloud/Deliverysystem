<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU Delivery System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-slate-900/60 hidden transition-opacity duration-300"></div>

    <!-- Sidebar Drawer -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white shadow-2xl sidebar-transition -translate-x-full">
        <div class="h-full flex flex-col p-6">
            <div class="flex items-center justify-between mb-10 px-2">
                <div class="flex items-center space-x-3 text-orange-600">
                    <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="truck"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-tighter text-slate-900 uppercase italic">GURU</h1>
                </div>
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-900">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <nav id="navLinks" class="flex-1 space-y-1">
                <!-- Nav items dynamically generated -->
            </nav>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <main class="min-h-screen flex flex-col">
        <!-- Top Navigation -->
        <nav class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 sticky top-0 z-30">
            <div class="absolute left-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-600 flex items-center gap-2">
                    <i data-lucide="menu"></i>
                    <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu</span>
                </button>
            </div>
            <div class="flex-1 text-center">
                <h1 class="text-base md:text-lg font-black text-slate-900 tracking-[0.2em] uppercase italic inline-block px-6">
                    GURU Delivery System
                </h1>
            </div>
        </nav>

        <!-- Dynamic Content Container -->
        <div id="app" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
            <div id="sectionHeader" class="mb-8 animate-in fade-in slide-in-from-top-2">
                <h2 id="viewTitle" class="text-2xl font-black text-slate-900 uppercase tracking-tight">View Title</h2>
                <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">GURU Operations Control</p>
            </div>

            <div id="viewContent" class="pb-20">
                <!-- Content injected here by JS -->
            </div>
        </div>
    </main>

    <!-- Global Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden modal-bg">
        <div id="modalBody" class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script>
        // --- Central State ---
        let state = {
            currentView: 'customers',
            customers: [
                { id: "C-101", name: "Alice Johnson", primaryPhone: "1234567890", alternatePhone: "0987654321", address: "123 Maple St, NY", addressLink: "https://maps.google.com" },
                { id: "C-102", name: "Bob Smith", primaryPhone: "9876543210", alternatePhone: "", address: "456 Oak Ave, CA", addressLink: "" }
            ],
            deliveries: [
                { id: "ORD-001", customerId: "C-101", customerName: "Alice Johnson", driver: "Rajesh", status: "Delivered", priority: "High", amount: "550", paymentMode: "Cash", date: "2024-05-20", time: "10:30 AM", assignedAt: Date.now() - 7200000, deliveredAt: Date.now() - 3600000 }
            ],
            drivers: [
                { name: "Rajesh", phone: "9988776655", addressLink: "" },
                { name: "Suresh", phone: "8877665544", addressLink: "" }
            ],
            customerVisibleCount: 10,
            editingCustomer: null,
            editingDriver: null
        };

        const menuItems = [
            { id: 'customers', label: 'Customer Data', icon: 'users' },
            { id: 'assign', label: 'Assign', icon: 'truck' },
            { id: 'today', label: 'Today Delivery', icon: 'calendar' },
            { id: 'past', label: 'Past Orders', icon: 'history' },
            { id: 'analysis', label: 'Analysis', icon: 'bar-chart-3' },
            { id: 'settings', label: 'Settings', icon: 'settings' }
        ];

        // --- Core Functions ---
        function init() {
            renderSidebar();
            navigateTo('customers');
            lucide.createIcons();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const over = document.getElementById('sidebarOverlay');
            const isOpen = !sb.classList.contains('-translate-x-full');
            
            if (isOpen) {
                sb.classList.add('-translate-x-full');
                over.classList.add('hidden');
            } else {
                sb.classList.remove('-translate-x-full');
                over.classList.remove('hidden');
            }
        }

        function navigateTo(id) {
            state.currentView = id;
            const item = menuItems.find(m => m.id === id);
            document.getElementById('viewTitle').innerText = item.label;
            renderSidebar();
            renderView();
            if (window.innerWidth < 1024) toggleSidebar();
            window.scrollTo(0, 0);
        }

        function renderSidebar() {
            const nav = document.getElementById('navLinks');
            nav.innerHTML = menuItems.map(item => `
                <button onclick="navigateTo('${item.id}')" 
                    class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${state.currentView === item.id ? 'bg-orange-600 text-white shadow-lg shadow-orange-100' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'}">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">${item.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderView() {
            const container = document.getElementById('viewContent');
            switch (state.currentView) {
                case 'customers': renderCustomerSection(container); break;
                case 'assign': renderAssignSection(container); break;
                case 'today': renderTodaySection(container); break;
                case 'past': renderPastSection(container); break;
                case 'analysis': renderAnalysisSection(container); break;
                case 'settings': renderSettingsSection(container); break;
            }
            lucide.createIcons();
        }

        // --- View: Customers ---
        function renderCustomerSection(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4">
                    <div class="xl:col-span-1">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm sticky top-24">
                            <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
                                <i data-lucide="${state.editingCustomer ? 'edit-2' : 'user-plus'}" class="${state.editingCustomer ? 'text-blue-600' : 'text-orange-600'}"></i>
                                ${state.editingCustomer ? 'Edit Customer' : 'Add Customer'}
                            </h3>
                            <form id="customerForm" class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Customer ID</label>
                                    <input type="text" id="c_id" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-orange-500/20" value="${state.editingCustomer ? state.editingCustomer.id : ''}"></div>
                                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Full Name</label>
                                    <input type="text" id="c_name" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-orange-500/20" value="${state.editingCustomer ? state.editingCustomer.name : ''}"></div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Primary No.</label>
                                    <input type="text" id="c_p1" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" value="${state.editingCustomer ? state.editingCustomer.primaryPhone : ''}"></div>
                                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Alt No.</label>
                                    <input type="text" id="c_p2" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" value="${state.editingCustomer ? state.editingCustomer.alternatePhone : ''}"></div>
                                </div>
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Address</label>
                                <textarea id="c_addr" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" rows="2">${state.editingCustomer ? state.editingCustomer.address : ''}</textarea></div>
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Address Link</label>
                                <input type="text" id="c_link" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" placeholder="Maps URL" value="${state.editingCustomer ? state.editingCustomer.addressLink : ''}"></div>
                                <div class="flex gap-2">
                                    <button type="submit" class="flex-1 ${state.editingCustomer ? 'bg-blue-600' : 'bg-orange-600'} text-white py-3 rounded-xl font-bold transition-all shadow-lg">${state.editingCustomer ? 'Update' : 'Save Entry'}</button>
                                    ${state.editingCustomer ? `<button type="button" onclick="cancelCustomerEdit()" class="px-4 bg-slate-100 text-slate-500 rounded-xl font-bold">Cancel</button>` : ''}
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="xl:col-span-2 space-y-4">
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3">
                            <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
                            <input type="text" id="customerSearch" oninput="renderCustomerList()" placeholder="Search by Name, ID or Number..." class="flex-1 bg-transparent border-none outline-none text-sm">
                        </div>
                        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-50 border-b border-slate-100">
                                        <tr><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Customer</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Contact</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-right">Actions</th></tr>
                                    </thead>
                                    <tbody id="customerTableBody" class="divide-y divide-slate-100"></tbody>
                                </table>
                            </div>
                            <div id="showMoreContainer" class="p-4 border-t border-slate-100 text-center hidden">
                                <button onclick="state.customerVisibleCount += 10; renderCustomerList()" class="text-xs font-black text-orange-600 uppercase tracking-widest hover:underline">Show More Records</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('customerForm').onsubmit = (e) => {
                e.preventDefault();
                const data = {
                    id: document.getElementById('c_id').value,
                    name: document.getElementById('c_name').value,
                    primaryPhone: document.getElementById('c_p1').value,
                    alternatePhone: document.getElementById('c_p2').value,
                    address: document.getElementById('c_addr').value,
                    addressLink: document.getElementById('c_link').value
                };
                if (state.editingCustomer) {
                    state.customers = state.customers.map(c => c.id === state.editingCustomer.id ? data : c);
                    state.editingCustomer = null;
                } else {
                    state.customers.push(data);
                }
                renderCustomerSection(container);
                lucide.createIcons();
            };
            renderCustomerList();
        }

        function cancelCustomerEdit() {
            state.editingCustomer = null;
            renderView();
        }

        function renderCustomerList() {
            const query = document.getElementById('customerSearch').value.toLowerCase();
            const filtered = state.customers.filter(c => 
                c.name.toLowerCase().includes(query) || 
                c.id.toLowerCase().includes(query) || 
                c.primaryPhone.includes(query)
            );

            const tbody = document.getElementById('customerTableBody');
            const showMore = document.getElementById('showMoreContainer');
            
            const display = filtered.slice(0, state.customerVisibleCount);
            tbody.innerHTML = display.map(c => `
                <tr onclick="showCustomerDetails('${c.id}')" class="hover:bg-slate-50/50 cursor-pointer group">
                    <td class="px-6 py-4"><p class="font-bold text-slate-900">${c.name || 'N/A'}</p><p class="text-[10px] text-slate-400 font-black uppercase">ID: ${c.id}</p></td>
                    <td class="px-6 py-4 text-xs text-slate-500">${c.primaryPhone}</td>
                    <td class="px-6 py-4 text-right" onclick="event.stopPropagation()">
                        <div class="flex justify-end gap-1">
                            <button onclick="editCustomer('${c.id}')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="deleteCustomer('${c.id}')" class="p-2 text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');

            if (filtered.length > state.customerVisibleCount) showMore.classList.remove('hidden');
            else showMore.classList.add('hidden');
            lucide.createIcons();
        }

        function editCustomer(id) {
            state.editingCustomer = state.customers.find(c => c.id === id);
            renderView();
        }

        function deleteCustomer(id) {
            if(confirm("Delete customer?")) {
                state.customers = state.customers.filter(c => c.id !== id);
                renderView();
            }
        }

        function showCustomerDetails(id) {
            const c = state.customers.find(x => x.id === id);
            openModal(`
                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                    <div><h3 class="text-xl font-black uppercase">Profile</h3><p class="text-slate-400 text-xs font-bold uppercase mt-0.5">#${c.id}</p></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Full Name</p><p class="font-bold text-slate-900">${c.name}</p></div>
                        <div class="space-y-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Primary Phone</p><p class="font-bold text-slate-900">${c.primaryPhone}</p></div>
                        <div class="space-y-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Alt Phone</p><p class="font-bold text-slate-900">${c.alternatePhone || 'None'}</p></div>
                        <div class="space-y-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Registered ID</p><p class="font-bold text-slate-900">${c.id}</p></div>
                    </div>
                    <div class="space-y-1 pt-4 border-t border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Address</p>
                        <p class="text-sm font-medium text-slate-600 leading-relaxed">${c.address}</p>
                    </div>
                    <div class="flex gap-3">
                        <a href="tel:${c.primaryPhone}" class="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Call Customer</a>
                        ${c.addressLink ? `<a href="${c.addressLink}" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs">Open Map</a>` : ''}
                    </div>
                </div>
            `);
        }

        // --- View: Assign ---
        function renderAssignSection(container) {
            const pending = state.deliveries.filter(d => d.status === 'Pending');
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                    <div class="flex justify-end">
                        <button onclick="openAssignModal()" class="bg-orange-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg hover:bg-orange-700 transition-all hover:scale-105">
                            <i data-lucide="plus" class="w-8 h-8"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${pending.length === 0 ? `
                            <div class="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl text-slate-400">
                                No pending assignments. Click the plus icon to create one.
                            </div>
                        ` : pending.map(d => `
                            <div onclick="showOrderAssignment('${d.id}')" class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm border-t-4 border-t-orange-500 cursor-pointer hover:shadow-md transition-all">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${d.priority === 'High' ? 'bg-rose-50 text-rose-600' : 'bg-slate-50 text-slate-500'}">${d.priority} Priority</span>
                                    <span class="text-xs font-medium text-slate-400">${d.time}</span>
                                </div>
                                <h4 class="text-slate-900 font-black text-lg">${d.customerName}</h4>
                                <div class="flex flex-wrap items-center gap-2 mt-2">
                                   <div class="bg-slate-50 px-2 py-1 rounded-lg text-[10px] font-bold text-slate-500 uppercase">Driver: ${d.driver}</div>
                                   <div class="bg-orange-50 px-2 py-1 rounded-lg text-[10px] font-bold text-orange-600 uppercase">₹${d.amount} • ${d.paymentMode}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function openAssignModal() {
            const today = new Date().toISOString().split('T')[0];
            openModal(`
                <div class="bg-slate-900 p-6 text-white rounded-t-3xl flex justify-between items-center">
                    <div><h3 class="text-xl font-black uppercase tracking-tight">Assign Delivery</h3><p class="text-slate-400 text-xs font-bold mt-1 uppercase">Operations Panel</p></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x"></i></button>
                </div>
                <div class="p-8 space-y-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                    <div><label class="block text-xs font-black text-slate-400 uppercase mb-2">Delivery Date</label><input type="date" id="new_date" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm outline-none" value="${today}"></div>
                    
                    <div class="relative"><label class="block text-xs font-black text-slate-400 uppercase mb-2">Search Customer</label>
                        <div class="relative"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" id="assignSearch" oninput="searchCustomerForAssign()" placeholder="ID or Name..." class="w-full pl-11 pr-10 py-3 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-orange-500/20"></div>
                        <div id="assignSearchResults" class="mt-2 space-y-1"></div>
                        <div id="selectedCustomerDisplay" class="mt-2 p-3 bg-orange-50 text-orange-600 rounded-xl text-xs font-black uppercase hidden"></div>
                        <input type="hidden" id="new_cid"><input type="hidden" id="new_cname">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-black text-slate-400 uppercase mb-2">Pay Mode</label><select id="new_mode" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none"><option value="Cash">Cash</option><option value="Online">Online</option><option value="Prepaid">Prepaid</option></select></div>
                        <div><label class="block text-xs font-black text-slate-400 uppercase mb-2">Amount</label><input type="number" id="new_amt" placeholder="0.00" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm outline-none"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-black text-slate-400 uppercase mb-2">Delivery Boy</label><select id="new_driver" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none">${state.drivers.map(d => `<option value="${d.name}">${d.name}</option>`).join('')}</select></div>
                        <div><label class="block text-xs font-black text-slate-400 uppercase mb-2">Priority</label><select id="new_prio" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none"><option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High</option></select></div>
                    </div>

                    <button onclick="confirmAssignment()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-600 transition-colors shadow-lg mt-4">Confirm Assignment</button>
                </div>
            `);
        }

        function searchCustomerForAssign() {
            const query = document.getElementById('assignSearch').value.toLowerCase();
            const results = document.getElementById('assignSearchResults');
            if (query.length < 1) { results.innerHTML = ''; return; }

            const filtered = state.customers.filter(c => c.name.toLowerCase().includes(query) || c.id.toLowerCase().includes(query));
            results.innerHTML = filtered.map(c => `
                <button onclick="selectCustomerForAssign('${c.id}', '${c.name}')" class="w-full text-left p-3 border border-slate-100 rounded-xl hover:bg-slate-50 flex justify-between items-center transition-colors">
                    <span class="font-bold text-sm">${c.name}</span>
                    <span class="text-[10px] font-black text-slate-400">${c.id}</span>
                </button>
            `).join('');
        }

        function selectCustomerForAssign(id, name) {
            document.getElementById('new_cid').value = id;
            document.getElementById('new_cname').value = name;
            document.getElementById('assignSearch').value = '';
            document.getElementById('assignSearchResults').innerHTML = '';
            const display = document.getElementById('selectedCustomerDisplay');
            display.innerText = "Selected: " + name;
            display.classList.remove('hidden');
        }

        function confirmAssignment() {
            const cid = document.getElementById('new_cid').value;
            if (!cid) { alert("Select a customer"); return; }
            const o = {
                id: "ORD-" + Math.floor(1000 + Math.random() * 9000),
                customerId: cid,
                customerName: document.getElementById('new_cname').value,
                driver: document.getElementById('new_driver').value,
                status: 'Pending',
                priority: document.getElementById('new_prio').value,
                amount: document.getElementById('new_amt').value || "0",
                paymentMode: document.getElementById('new_mode').value,
                date: document.getElementById('new_date').value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                assignedAt: Date.now()
            };
            state.deliveries.push(o);
            closeModal();
            renderView();
        }

        function showOrderAssignment(id) {
            const o = state.deliveries.find(x => x.id === id);
            const c = state.customers.find(x => x.id === o.customerId);
            openModal(`
                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                    <div><h3 class="text-xl font-black uppercase">Assignment Details</h3><p class="text-slate-400 text-xs font-bold uppercase mt-0.5">${o.id}</p></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase">Customer</p><p class="text-sm font-bold text-slate-900">${o.customerName}</p></div>
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase">Assigned Driver</p><p class="text-sm font-bold text-slate-900">${o.driver}</p></div>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 flex justify-between">
                        <div><p class="text-[10px] font-bold text-orange-600 uppercase">To Collect</p><p class="text-xl font-black text-slate-900">₹${o.amount}</p></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-orange-600 uppercase">Payment Mode</p><p class="text-sm font-bold text-slate-700">${o.paymentMode}</p></div>
                    </div>
                    <button onclick="notifyViaWA('${o.id}')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase hover:bg-emerald-700 flex items-center justify-center gap-3">
                        <i data-lucide="message-circle"></i> Notify Customer
                    </button>
                </div>
            `);
        }

        function notifyViaWA(id) {
            const o = state.deliveries.find(x => x.id === id);
            const c = state.customers.find(x => x.id === o.customerId);
            const msg = `Hello ${o.customerName}, we have assigned your delivery partner ${o.driver}. Order #${o.id} will arrive shortly. Amount: ₹${o.amount}.`;
            window.open(`https://wa.me/${c.primaryPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- View: Today Delivery ---
        function renderTodaySection(container) {
            const pending = state.deliveries.filter(d => d.status === 'Pending');
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${pending.length === 0 ? `<div class="col-span-full py-20 text-center text-slate-300 italic bg-white border border-slate-100 rounded-3xl">No active tasks.</div>` : 
                        pending.map(d => `
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                <div class="flex justify-between items-start mb-3"><span class="text-[10px] font-bold text-slate-400">#${d.id} • ${d.time}</span></div>
                                <h4 class="font-black text-slate-900 text-lg mb-4">${d.customerName}</h4>
                                <div class="flex gap-2">
                                    <button onclick="showTaskDetails('${d.id}')" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg text-xs font-bold">Details</button>
                                    <button onclick="markDelivered('${d.id}')" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-xs font-bold">Delivered</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function showTaskDetails(id) {
            const o = state.deliveries.find(x => x.id === id);
            const c = state.customers.find(x => x.id === o.customerId);
            openModal(`
                <div class="bg-orange-600 p-6 text-white flex justify-between items-center">
                    <div><h3 class="text-xl font-black uppercase">Task Hub</h3><p class="text-xs font-bold uppercase mt-0.5">${o.id}</p></div>
                    <button onclick="closeModal()" class="p-2 hover:bg-orange-500 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <div class="p-6 space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase">Customer</p><p class="text-sm font-bold text-slate-900">${o.customerName}</p></div>
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase">Collect</p><p class="text-lg font-black text-orange-600">₹${o.amount}</p></div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl flex justify-between items-center border border-slate-100">
                        <span class="text-[10px] font-black uppercase text-slate-400">Mode: ${o.paymentMode}</span>
                        <a href="tel:${c.primaryPhone}" class="text-blue-600 font-bold text-xs uppercase flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> Call Now</a>
                    </div>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Address</p><p class="text-sm font-medium">${c.address}</p></div>
                    <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-100">
                        <a href="https://wa.me/${c.primaryPhone}" target="_blank" class="flex flex-col items-center gap-1 p-3 rounded-2xl bg-emerald-50 text-emerald-600 font-black uppercase text-[10px]"><i data-lucide="message-circle"></i> WhatsApp</a>
                        <a href="${c.addressLink || `https://maps.google.com?q=${c.address}`}" target="_blank" class="flex flex-col items-center gap-1 p-3 rounded-2xl bg-orange-50 text-orange-600 font-black uppercase text-[10px]"><i data-lucide="navigation"></i> Open Map</a>
                    </div>
                </div>
            `);
        }

        function markDelivered(id) {
            const o = state.deliveries.find(x => x.id === id);
            o.status = 'Delivered';
            o.deliveredAt = Date.now();
            renderView();
        }

        // --- View: Past Orders ---
        function renderPastSection(container) {
            const delivered = state.deliveries.filter(d => d.status === 'Delivered');
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-wrap gap-4 items-end">
                        <div class="flex-1 min-w-[140px]"><label class="block text-[10px] font-black text-slate-400 uppercase mb-1">From</label><input type="date" id="p_from" class="w-full text-xs border border-slate-200 rounded-lg p-2 outline-none"></div>
                        <div class="flex-1 min-w-[140px]"><label class="block text-[10px] font-black text-slate-400 uppercase mb-1">To</label><input type="date" id="p_to" class="w-full text-xs border border-slate-200 rounded-lg p-2 outline-none"></div>
                        <div class="w-24"><label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Year</label><select id="p_year" class="w-full text-xs border border-slate-200 rounded-lg p-2 outline-none"><option value="All">All</option><option value="2024" selected>2024</option><option value="2025">2025</option></select></div>
                        <button onclick="renderPastOrdersList()" class="bg-slate-900 text-white p-2 px-6 rounded-lg font-bold text-xs">Filter</button>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b border-slate-100">
                                <tr><th class="px-6 py-4 text-[10px] font-black uppercase">Order</th><th class="px-6 py-4 text-[10px] font-black uppercase">Customer</th><th class="px-6 py-4 text-[10px] font-black uppercase">Driver</th><th class="px-6 py-4 text-[10px] font-black uppercase text-right">Amount</th></tr>
                            </thead>
                            <tbody id="pastOrdersBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            `;
            renderPastOrdersList();
        }

        function renderPastOrdersList() {
            const from = document.getElementById('p_from').value;
            const to = document.getElementById('p_to').value;
            const year = document.getElementById('p_year').value;

            const filtered = state.deliveries.filter(d => {
                if (d.status !== 'Delivered') return false;
                if (year !== 'All' && new Date(d.date).getFullYear() !== Number(year)) return false;
                if (from && d.date < from) return false;
                if (to && d.date > to) return false;
                return true;
            });

            document.getElementById('pastOrdersBody').innerHTML = filtered.map(o => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4"><p class="font-black text-xs">${o.id}</p><p class="text-[10px] text-slate-400">${o.date}</p></td>
                    <td class="px-6 py-4"><p class="font-bold text-sm text-slate-800">${o.customerName}</p></td>
                    <td class="px-6 py-4"><span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase">${o.driver}</span></td>
                    <td class="px-6 py-4 text-right font-black text-emerald-600">₹${o.amount}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        // --- View: Analysis ---
        function renderAnalysisSection(container) {
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                    <div id="analysisSubTabs" class="flex bg-white p-1 rounded-xl border border-slate-200 w-full max-w-lg shadow-sm">
                        <button onclick="renderSubAnalysis('general')" id="tab_general" class="flex-1 py-2 rounded-lg text-xs font-bold bg-orange-600 text-white">General</button>
                        <button onclick="renderSubAnalysis('financial')" id="tab_financial" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-500">Financial</button>
                        <button onclick="renderSubAnalysis('top')" id="tab_top" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-500">Top Customers</button>
                    </div>
                    <div id="analysisTarget"></div>
                </div>
            `;
            renderSubAnalysis('general');
        }

        function renderSubAnalysis(tab) {
            const target = document.getElementById('analysisTarget');
            const btns = document.querySelectorAll('#analysisSubTabs button');
            btns.forEach(b => { b.classList.remove('bg-orange-600', 'text-white'); b.classList.add('text-slate-500'); });
            document.getElementById('tab_'+tab).classList.add('bg-orange-600', 'text-white');
            document.getElementById('tab_'+tab).classList.remove('text-slate-500');

            const delivered = state.deliveries.filter(d => d.status === 'Delivered');
            const online = delivered.filter(d => d.paymentMode === 'Online').reduce((a,c) => a + Number(c.amount), 0);
            const cash = delivered.filter(d => d.paymentMode === 'Cash').reduce((a,c) => a + Number(c.amount), 0);
            const prepaid = delivered.filter(d => d.paymentMode === 'Prepaid').reduce((a,c) => a + Number(c.amount), 0);
            
            let totalTripMs = delivered.filter(d => d.deliveredAt && d.assignedAt).reduce((a,c) => a + (c.deliveredAt - c.assignedAt), 0);
            let avgTrip = delivered.length > 0 ? totalTripMs / delivered.length : 0;

            if (tab === 'general') {
                target.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Total</p><h3 class="text-2xl font-black">${state.deliveries.length}</h3></div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Delivered</p><h3 class="text-2xl font-black text-emerald-600">${delivered.length}</h3></div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Avg Trip</p><h3 class="text-2xl font-black text-blue-600">${formatDuration(avgTrip)}</h3></div>
                    </div>
                `;
            } else if (tab === 'financial') {
                target.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Online</p><h3 class="text-2xl font-black">₹${online}</h3></div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Cash</p><h3 class="text-2xl font-black">₹${cash}</h3></div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase">Prepaid</p><h3 class="text-2xl font-black">₹${prepaid}</h3></div>
                    </div>
                `;
            } else {
                const map = {};
                state.deliveries.forEach(d => {
                    if(!map[d.customerId]) map[d.customerId] = { name: d.customerName, count: 0, val: 0 };
                    map[d.customerId].count++;
                    map[d.customerId].val += Number(d.amount);
                });
                const top = Object.values(map).sort((a,b) => b.count - a.count).slice(0, 5);
                target.innerHTML = `
                    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
                        <table class="w-full text-left">
                            <tbody class="divide-y divide-slate-100">
                                ${top.map((c, i) => `
                                    <tr class="p-4">
                                        <td class="p-4 font-black text-slate-400">#${i+1}</td>
                                        <td class="p-4 font-bold">${c.name}</td>
                                        <td class="p-4 text-xs font-black text-blue-600">${c.count} Orders</td>
                                        <td class="p-4 text-right font-black">₹${c.val}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }

        // --- View: Settings ---
        function renderSettingsSection(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4">
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm h-fit">
                        <h3 class="text-lg font-black text-slate-900 uppercase flex items-center gap-2 mb-6"><i data-lucide="contact" class="text-orange-600"></i>${state.editingDriver ? 'Update Partner' : 'Register Partner'}</h3>
                        <form id="driverForm" class="space-y-4">
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Name</label><input type="text" id="d_name" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" value="${state.editingDriver ? state.editingDriver.name : ''}"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mobile</label><input type="text" id="d_phone" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" value="${state.editingDriver ? state.editingDriver.phone : ''}"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Location Link</label><input type="text" id="d_link" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none" value="${state.editingDriver ? state.editingDriver.addressLink : ''}"></div>
                            <div class="flex gap-2">
                                <button type="submit" class="flex-1 ${state.editingDriver ? 'bg-blue-600' : 'bg-slate-900'} text-white py-3 rounded-xl font-bold uppercase text-xs">${state.editingDriver ? 'Update' : 'Register'}</button>
                                ${state.editingDriver ? `<button type="button" onclick="cancelDriverEdit()" class="px-4 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs">Cancel</button>` : ''}
                            </div>
                        </form>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm h-fit">
                        <div class="p-6 border-b border-slate-100 font-black uppercase text-sm">Active Partners</div>
                        <div class="divide-y divide-slate-100">
                            ${state.drivers.map((d, i) => `
                                <div class="flex items-center justify-between p-4 group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-orange-100 text-orange-600 flex items-center justify-center rounded-lg font-black text-xs">${d.name.substring(0, 2)}</div>
                                        <div><p class="font-bold text-sm">${d.name}</p><p class="text-[10px] text-slate-400">${d.phone}</p></div>
                                    </div>
                                    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="editDriver(${i})" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                        <button onclick="deleteDriver(${i})" class="p-2 text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('driverForm').onsubmit = (e) => {
                e.preventDefault();
                const d = { name: document.getElementById('d_name').value, phone: document.getElementById('d_phone').value, addressLink: document.getElementById('d_link').value };
                if (state.editingDriver !== null) state.drivers[state.editingDriver] = d;
                else state.drivers.push(d);
                state.editingDriver = null;
                renderView();
            };
        }

        function editDriver(i) { state.editingDriver = i; renderView(); }
        function cancelDriverEdit() { state.editingDriver = null; renderView(); }
        function deleteDriver(i) { if(confirm("Remove driver?")) { state.drivers.splice(i, 1); renderView(); } }

        // --- Modals ---
        function openModal(html) {
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalContainer').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modalContainer').classList.add('hidden');
        }

        // Initialize on Load
        window.onload = init;
    </script>
</body>
</html>
