<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU Delivery System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #ea580c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Loading State Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center space-y-4">
        <div class="loading-spinner"></div>
        <p class="text-xs font-black uppercase tracking-widest text-slate-400">Syncing with GURU Cloud...</p>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-slate-900/60 hidden transition-opacity duration-300" onclick="window.toggleSidebar()"></div>

    <!-- Sidebar Drawer -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white shadow-2xl sidebar-transition -translate-x-full">
        <div class="h-full flex flex-col p-6">
            <div class="flex items-center justify-between mb-10 px-2">
                <div class="flex items-center space-x-3 text-orange-600">
                    <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="truck"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-tighter text-slate-900 uppercase italic">GURU</h1>
                </div>
                <button onclick="window.toggleSidebar()" class="text-slate-400 hover:text-slate-900">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav id="navLinks" class="flex-1 space-y-2 overflow-y-auto custom-scrollbar pr-1"></nav>
        </div>
    </aside>

    <main class="min-h-screen flex flex-col">
        <nav class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 sticky top-0 z-30">
            <div class="absolute left-4">
                <button onclick="window.toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-600 flex items-center gap-2">
                    <i data-lucide="menu"></i>
                    <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu</span>
                </button>
            </div>
            <div class="flex-1 text-center">
                <h1 class="text-base md:text-lg font-black text-slate-900 tracking-[0.2em] uppercase italic inline-block px-6 text-orange-600">GURU Delivery System</h1>
            </div>
        </nav>

        <div id="app" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
            <div id="sectionHeader" class="mb-8 animate-in fade-in slide-in-from-top-2">
                <h2 id="viewTitle" class="text-2xl font-black text-slate-900 uppercase tracking-tight">View Title</h2>
                <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">Cloud Control Dashboard</p>
            </div>
            <div id="viewContent" class="pb-20"></div>
        </div>
    </main>

    <!-- Global Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden modal-bg">
        <div id="modalBody" class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95"></div>
    </div>

    <!-- Firebase SDK Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        const providedConfig = {
            apiKey: "AIzaSyChCQIDBXdtEoJZPBrJxDQWB8bVobZiBRQ",
            authDomain: "gurudeliverysystem.firebaseapp.com",
            projectId: "gurudeliverysystem",
            storageBucket: "gurudeliverysystem.firebasestorage.app",
            messagingSenderId: "197900697167",
            appId: "1:197900697167:web:210d24d7e61f70360bb43a",
            measurementId: "G-W19WCFKBFG"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : providedConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'guru-delivery-system-v1';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Central State ---
        let state = {
            user: null,
            currentView: 'customers',
            customers: [],
            deliveries: [],
            drivers: [],
            customerVisibleCount: 10,
            editingCustomer: null,
            editingDriverIndex: null,
            activeTodayDriver: null,
            performanceFilter: { driver: 'All', fromDate: '', toDate: '' },
            topCustomerFilter: { fromDate: '', toDate: '', customerId: '' },
            listenersStarted: false,
            initialLoadCount: 0
        };

        const menuItems = [
            { id: 'customers', label: 'Customer Data', icon: 'users' },
            { id: 'assign', label: 'Assign', icon: 'truck' },
            { id: 'past', label: 'Past Orders', icon: 'history' },
            { id: 'top_customers', label: 'Top Customers', icon: 'award' },
            { id: 'settings', label: 'Settings', icon: 'settings' },
            { id: 'today', label: 'Today Delivery', icon: 'calendar', special: true },
            { id: 'my_performance', label: 'My Performance', icon: 'user-check', special: true }
        ];

        // --- Core Helper Functions ---
        window.formatDuration = (ms) => {
            if (!ms || ms < 0) return "N/A";
            const minutes = Math.floor(ms / 60000);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            return `${hours}h ${minutes % 60}m`;
        };

        window.formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) : "-";

        window.toggleSidebar = () => {
            const sb = document.getElementById('sidebar');
            const over = document.getElementById('sidebarOverlay');
            if (!sb || !over) return;
            const isOpen = !sb.classList.contains('-translate-x-full');
            sb.classList.toggle('-translate-x-full', isOpen);
            over.classList.toggle('hidden', isOpen);
        };

        window.navigateTo = (id) => {
            state.currentView = id;
            const item = menuItems.find(m => m.id === id);
            if (item) {
                const titleEl = document.getElementById('viewTitle');
                if (titleEl) titleEl.innerText = item.label;
            }
            renderSidebar();
            renderView();
            const sb = document.getElementById('sidebar');
            if (sb && !sb.classList.contains('-translate-x-full')) window.toggleSidebar();
            window.scrollTo(0, 0);
        };

        window.openModal = (html) => {
            const body = document.getElementById('modalBody');
            const container = document.getElementById('modalContainer');
            if (body && container) {
                body.innerHTML = html;
                container.classList.remove('hidden');
                lucide.createIcons();
            }
        };

        window.closeModal = () => {
            const container = document.getElementById('modalContainer');
            if (container) container.classList.add('hidden');
        };

        // --- Backend Auth & Listeners ---
        async function initBackend() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.user = user;
                        if (!state.listenersStarted) {
                            state.listenersStarted = true;
                            startListeners();
                        }
                    }
                });
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('loadingOverlay').innerHTML = `<p class="text-rose-600 font-bold p-4 text-center text-xs uppercase tracking-widest">Authentication Failed. Please Refresh.</p>`;
            }
        }

        function startListeners() {
            const publicPath = (coll) => collection(db, 'artifacts', appId, 'public', 'data', coll);

            onSnapshot(publicPath('customers'), (snapshot) => {
                state.customers = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                checkInitialLoading();
            }, (err) => console.error("Customer sync failed", err));

            onSnapshot(publicPath('deliveries'), (snapshot) => {
                state.deliveries = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                checkInitialLoading();
            }, (err) => console.error("Deliveries sync failed", err));

            onSnapshot(publicPath('drivers'), (snapshot) => {
                state.drivers = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                if (!state.activeTodayDriver && state.drivers.length > 0) state.activeTodayDriver = state.drivers[0].name;
                checkInitialLoading();
            }, (err) => console.error("Drivers sync failed", err));
        }

        function checkInitialLoading() {
            state.initialLoadCount++;
            if (state.initialLoadCount >= 3) {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.classList.add('hidden');
                renderSidebar();
                renderView();
            }
        }

        // --- Data Operations ---
        window.saveCustomer = async (data) => {
            if (!state.user) return;
            const coll = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
            if (state.editingCustomer) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', state.editingCustomer.firebaseId), data);
                state.editingCustomer = null;
            } else {
                await addDoc(coll, data);
            }
            window.navigateTo('customers');
        };

        window.deleteCustomer = async (fid) => { if (confirm("Delete customer?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', fid)); };

        window.saveAssignment = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'deliveries'), data); window.closeModal(); };

        window.deleteOrder = (fid) => {
            window.openModal(`
                <div class="p-8 text-center space-y-6">
                    <div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-triangle"></i></div>
                    <h3 class="text-xl font-black uppercase tracking-tight">Remove Task?</h3>
                    <p class="text-slate-500 text-sm">Do you want to delete this assignment permanently?</p>
                    <div class="grid grid-cols-2 gap-3 pt-4">
                        <button onclick="window.confirmDeleteOrder('${fid}')" class="bg-rose-600 text-white py-3 rounded-xl font-black uppercase text-xs shadow-lg shadow-rose-100">Delete</button>
                        <button onclick="window.closeModal()" class="bg-slate-100 text-slate-500 py-3 rounded-xl font-black uppercase text-xs">Cancel</button>
                    </div>
                </div>
            `);
        };
        window.confirmDeleteOrder = async (fid) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'deliveries', fid)); window.closeModal(); };

        window.updateDeliveryStatus = async (fid, status) => {
            const updates = { status };
            if (status === 'Picked Up') updates.pickedUpAt = Date.now();
            if (status === 'Delivered') updates.deliveredAt = Date.now();
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'deliveries', fid), updates);
            if (status === 'Delivered') window.closeModal(); else window.showTaskDetails(fid);
        };

        window.saveDriver = async (data) => {
            const coll = collection(db, 'artifacts', appId, 'public', 'data', 'drivers');
            if (state.editingDriverIndex !== null) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', state.drivers[state.editingDriverIndex].firebaseId), data);
                state.editingDriverIndex = null;
            } else {
                await addDoc(coll, data);
            }
            window.resetDriverForm();
        };

        window.removeDriver = async (fid) => { if(confirm('Delete partner?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', fid)); };

        // --- Render Functions ---
        function renderSidebar() {
            const nav = document.getElementById('navLinks');
            if(!nav) return;
            nav.innerHTML = menuItems.map(item => {
                const isActive = state.currentView === item.id;
                const activeCls = isActive ? (item.special ? 'bg-slate-900 text-white shadow-xl ring-2 ring-orange-500/20' : 'bg-orange-600 text-white shadow-lg shadow-orange-100')
                                          : (item.special ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900');
                return `<button onclick="window.navigateTo('${item.id}')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${activeCls}"><i data-lucide="${item.icon}" class="w-5 h-5"></i><span class="font-bold text-sm">${item.label}</span></button>`;
            }).join('');
            lucide.createIcons();
        }

        function renderView() {
            const container = document.getElementById('viewContent');
            if(!container) return;
            container.innerHTML = '';
            switch (state.currentView) {
                case 'customers': renderCustomerSection(container); break;
                case 'assign': renderAssignSection(container); break;
                case 'past': renderPastSection(container); break;
                case 'top_customers': renderTopCustomersSection(container); break;
                case 'settings': renderSettingsSection(container); break;
                case 'today': renderTodaySection(container); break;
                case 'my_performance': renderMyPerformanceSection(container); break;
            }
            lucide.createIcons();
        }

        function renderCustomerSection(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-2">
                    <div class="xl:col-span-1">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm sticky top-24">
                            <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2"><i data-lucide="${state.editingCustomer ? 'edit-2' : 'user-plus'}" class="${state.editingCustomer ? 'text-blue-600' : 'text-orange-600'}"></i>${state.editingCustomer ? 'Edit Customer' : 'Add Customer'}</h3>
                            <form id="customerForm" class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">ID</label><input type="text" id="c_id" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.id : ''}"></div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Name</label><input type="text" id="c_name" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.name : ''}"></div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Primary No.</label><input type="text" id="c_p1" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.primaryPhone : ''}"></div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Alt No.</label><input type="text" id="c_p2" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.alternatePhone : ''}"></div>
                                </div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Address</label><textarea id="c_addr" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" rows="2">${state.editingCustomer ? state.editingCustomer.address : ''}</textarea></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Maps URL</label><input type="text" id="c_link" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm" value="${state.editingCustomer ? state.editingCustomer.addressLink : ''}"></div>
                                <div class="flex gap-2">
                                    <button type="submit" class="flex-1 ${state.editingCustomer ? 'bg-blue-600' : 'bg-orange-600'} text-white py-3 rounded-xl font-bold shadow-lg">${state.editingCustomer ? 'Update' : 'Save Entry'}</button>
                                    ${state.editingCustomer ? `<button type="button" onclick="window.cancelCustomerEdit()" class="px-4 bg-slate-100 text-slate-500 rounded-xl font-bold">Cancel</button>` : ''}
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="xl:col-span-2 space-y-4">
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3"><i data-lucide="search" class="text-slate-400"></i><input type="text" id="customerSearch" oninput="window.renderCustomerList()" placeholder="Search Name, ID or Phone..." class="flex-1 bg-transparent border-none outline-none text-sm"></div>
                        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-100"><tr><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Customer</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Contact</th><th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-right">Actions</th></tr></thead>
                                <tbody id="customerTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                            <div id="showMoreContainer" class="p-4 border-t border-slate-100 text-center hidden"><button onclick="state.customerVisibleCount += 10; window.renderCustomerList()" class="text-xs font-black text-orange-600 uppercase tracking-widest hover:underline">Show More</button></div>
                        </div>
                    </div>
                </div>
            `;
            window.renderCustomerList();
        }

        window.renderCustomerList = () => {
            const queryVal = document.getElementById('customerSearch')?.value.toLowerCase() || '';
            const filtered = state.customers.filter(c => c.name.toLowerCase().includes(queryVal) || c.id.toLowerCase().includes(queryVal) || (c.primaryPhone && c.primaryPhone.includes(queryVal)));
            const tbody = document.getElementById('customerTableBody');
            if(!tbody) return;
            tbody.innerHTML = filtered.slice(0, state.customerVisibleCount).map(c => `
                <tr onclick="window.showCustomerDetails('${c.firebaseId}')" class="hover:bg-slate-50/50 cursor-pointer">
                    <td class="px-6 py-4 font-bold text-slate-800">${c.name}<br><span class="text-[10px] text-slate-400 uppercase font-black">ID: ${c.id}</span></td>
                    <td class="px-6 py-4 text-xs text-slate-500">${c.primaryPhone}</td>
                    <td class="px-6 py-4 text-right" onclick="event.stopPropagation()">
                        <div class="flex justify-end gap-1"><button onclick="window.editCustomer('${c.firebaseId}')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="window.deleteCustomer('${c.firebaseId}')" class="p-2 text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
                    </td>
                </tr>
            `).join('');
            document.getElementById('showMoreContainer').classList.toggle('hidden', filtered.length <= state.customerVisibleCount);
            lucide.createIcons();
        };

        window.editCustomer = (fid) => { state.editingCustomer = state.customers.find(c => c.firebaseId === fid); renderView(); };
        window.cancelCustomerEdit = () => { state.editingCustomer = null; renderView(); };

        window.showCustomerDetails = (fid) => {
            const c = state.customers.find(x => x.firebaseId === fid);
            if(!c) return;
            window.openModal(`
                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                    <div><h3 class="text-xl font-black uppercase">Profile Card</h3><p class="text-slate-400 text-xs font-bold uppercase mt-0.5">#${c.id}</p></div>
                    <button onclick="window.closeModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-2 gap-6"><div><p class="text-[10px] font-bold text-slate-400 uppercase">Full Name</p><p class="font-bold text-slate-900">${c.name}</p></div><div><p class="text-[10px] font-bold text-slate-400 uppercase">Customer ID</p><p class="font-bold text-slate-900">${c.id}</p></div></div>
                    <div class="space-y-1 pt-4 border-t border-slate-100"><p class="text-[10px] font-bold text-slate-400 uppercase">Contact</p><p class="text-sm font-bold text-slate-700">${c.primaryPhone} ${c.alternatePhone ? `| ${c.alternatePhone}` : ''}</p></div>
                    <div class="space-y-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Address</p><p class="text-sm font-medium text-slate-600 leading-relaxed">${c.address}</p></div>
                </div>
            `);
        };

        function renderAssignSection(container) {
            const pending = state.deliveries.filter(d => d.status === 'Pending' || d.status === 'Picked Up');
            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in">
                    <div class="flex justify-end"><button onclick="window.openAssignModal()" class="bg-orange-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg hover:scale-105 transition-transform"><i data-lucide="plus"></i></button></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${pending.length === 0 ? `<div class="col-span-full py-20 text-center text-slate-400 border-2 border-dashed rounded-3xl">No pending assignments.</div>` : 
                        pending.map(d => `
                            <div onclick="window.showOrderAssignment('${d.firebaseId}')" class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm border-t-4 border-t-orange-500 relative cursor-pointer">
                                <button onclick="event.stopPropagation(); window.deleteOrder('${d.firebaseId}')" class="absolute top-4 right-4 p-1 bg-slate-50 text-slate-400 hover:text-rose-600 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">#${d.id} • ${d.time}</p>
                                <h4 class="text-slate-900 font-black text-lg mt-1">${d.customerName}</h4>
                                <div class="flex flex-wrap gap-2 mt-2">
                                   <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-500 uppercase">Driver: ${d.driver}</span>
                                   <span class="bg-orange-50 px-2 py-0.5 rounded text-[10px] font-bold text-orange-600 uppercase">₹${d.amount} • ${d.paymentMode}</span>
                                </div>
                                <div class="mt-3 text-[10px] font-black uppercase text-slate-400 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${d.status}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.openAssignModal = () => {
            const today = new Date().toISOString().split('T')[0];
            window.openModal(`
                <div class="bg-slate-900 p-6 text-white rounded-t-3xl flex justify-between items-center">

        window.resetDriverForm = () => {
            state.editingDriverIndex = null;
            ['d_name', 'd_phone', 'd_link'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
            const btn = document.getElementById('driverBtn');
            const title = document.getElementById('driverFormTitle');
            const cancel = document.getElementById('cancelDriverBtn');
            if (btn) btn.innerText = 'Register';
            if (title) title.innerText = 'Register Personnel';
            if (cancel) cancel.classList.add('hidden');
        };

        // --- Main Initialization ---
        initBackend();
    </script>
</body>
</html>
